<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/todo" />
    </ion-buttons>
    <ion-title> Edit Todo </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formRoot]="todoForm" (submit)="todoForm().valid() && save()" novalidate>
    <ion-list>
      <ion-item lines="none">
        <ion-input
          errorText="Task is required"
          [formField]="todoForm.description"
          label="Task"
          labelPlacement="floating"
        />
        @if (fieldErrors()['description']; as error) {
          <span slot="error">{{ error }}</span>
        }
      </ion-item>

      <ion-item class="ion-margin-top">
        <ion-select [formField]="todoForm.priority" label="Priority" labelPlacement="floating">
          <ion-select-option value="low">Low</ion-select-option>
          <ion-select-option value="normal">Normal</ion-select-option>
          <ion-select-option value="high">High</ion-select-option>
        </ion-select>
        @if (fieldErrors()['priority']; as error) {
          <span slot="error">{{ error }}</span>
        }
      </ion-item>

      <ion-item class="ion-margin-top">
        <ion-input
          (click)="showCalendar.set(true)"
          [formField]="todoForm.dueDate"
          [readonly]="true"
          label="Due Date"
          labelPlacement="floating"
        />
        @if (fieldErrors()['dueDate']; as error) {
          <span slot="error">{{ error }}</span>
        }
        <ion-modal [isOpen]="showCalendar()">
          <ng-template>
            <ion-content>
              <ion-datetime
                (ionCancel)="showCalendar.set(false)"
                (ionChange)="dateChanged($event)"
                [showClearButton]="true"
                [showDefaultButtons]="true"
                [value]="todoModel().dueDate"
                presentation="date"
              />
            </ion-content>
          </ng-template>
        </ion-modal>
      </ion-item>
    </ion-list>

    <div class="ion-padding">
      <ion-button [disabled]="!todoForm().valid()" expand="block" type="submit">Save</ion-button>
    </div>
  </form>
</ion-content>
